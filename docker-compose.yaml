apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wallet-backend
  template:
    metadata:
      labels:
        app: wallet-backend
    spec:
      containers:
      - name: backend
        image: tu-registro/wallet-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DB_HOST
          value: "tu-servicio-mariadb" # O la IP del servidor
        # Usa K8s Secrets para el password